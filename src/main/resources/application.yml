#      auto-offset-reset: earliest
#      enable-auto-commit: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.commerce: DEBUG
    org.jooq.tools.LoggerListener: DEBUG
