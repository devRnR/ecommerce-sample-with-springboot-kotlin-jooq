spring:
  application:
    name: ecommerce
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5437/ecommerce
    username: ecommerce
    password: ecommerce
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  flyway:
    enabled: true
    locations: classpath:db/migration
  jooq:
    sql-dialect: POSTGRES
  data:
    redis:
      host: localhost
      port: 6378
